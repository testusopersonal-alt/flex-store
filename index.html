<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FL3X STORE — Minimal Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="watermark">fl3x_storee</div>

    <nav>
        <div class="logo">FL3X</div>
        <div class="nav-right">
            <button class="cart-btn" onclick="toggleCart()">CART (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <main>
        <header class="hero-minimal">
            <h1>NEW DROPS</h1>
            <p>SS/26 COLLECTION</p>
        </header>

        <section class="products-grid">
            <article class="product-card">
                <div class="product-slider">
                    <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?q=80&w=600" alt="Frente">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=600" alt="Espalda">
                </div>
                <div class="product-info">
                    <h2 class="product-name">HEAVYWEIGHT TEE</h2>
                    <p class="product-desc">Oversized fit, 240 GSM organic cotton.</p>
                    <span class="product-price">Q180.00</span>
                    <button class="add-to-cart" onclick="addToCart('HEAVYWEIGHT TEE', 180)">ADD TO CART</button>
                </div>
            </article>

            <article class="product-card">
                <div class="product-slider">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600" alt="Frente">
                    <img src="https://images.unsplash.com/photo-1556821921-252718e0018d?q=80&w=600" alt="Espalda">
                </div>
                <div class="product-info">
                    <h2 class="product-name">MODULAR HOODIE</h2>
                    <p class="product-desc">Boxy cut, brushed fleece interior.</p>
                    <span class="product-price">Q320.00</span>
                    <button class="add-to-cart" onclick="addToCart('MODULAR HOODIE', 320)">ADD TO CART</button>
                </div>
            </article>

            </section>
    </main>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>YOUR CART</h2>
                <button onclick="toggleCart()" style="background:none; border:none; color:#00ff2f; cursor:pointer;">CLOSE [X]</button>
            </div>
            <div id="cart-items"></div>
            <div class="cart-footer">
                <p>TOTAL: <span id="cart-total">Q0.00</span></p>
                <small style="opacity:0.5; display:block; margin-top:10px;">TOMA CAPTURA PARA WHATSAPP</small>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 FL3X STOREE — GUATEMALA</p>
    </footer>

    <script src="java/script.js"></script>
</body>
</html>
